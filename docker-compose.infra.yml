services:
  mysql:
    image: mysql:8.4
    container_name: smartcourier-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Shanib@123
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pShanib@123"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: smartcourier-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"

  zipkin:
    image: openzipkin/zipkin:3.4
    container_name: smartcourier-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"

volumes:
  mysql-data:
