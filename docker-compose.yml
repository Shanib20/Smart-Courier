services:
  mysql:
    image: mysql:8.4
    container_name: smartcourier-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Shanib@123
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pShanib@123"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: smartcourier-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"

  zipkin:
    image: openzipkin/zipkin:3.4
    container_name: smartcourier-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"

  config-server:
    build: ./config-server
    container_name: smartcourier-config-server
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: native
      CONFIG_REPO_LOCATION: file:/config-repo
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    volumes:
      - ./config-files:/config-repo:ro
    ports:
      - "8888:8888"
    depends_on:
      eureka-server:
        condition: service_started

  eureka-server:
    build: ./eureka-server
    container_name: smartcourier-eureka-server
    restart: unless-stopped
    environment:
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8761:8761"

  auth-service:
    build: ./auth-service
    container_name: smartcourier-auth-service
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: Shanib@123
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: muhammedshanib2002@gmail.com
      SPRING_MAIL_PASSWORD: "syzt wigr qejq dals"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: true
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: true
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started
      zipkin:
        condition: service_started

  delivery-service:
    build: ./delivery-service
    container_name: smartcourier-delivery-service
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: Shanib@123
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started
      zipkin:
        condition: service_started

  tracking-service:
    build: ./tracking-service
    container_name: smartcourier-tracking-service
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: Shanib@123
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      TRACKING_UPLOAD_DIR: /app/uploads/tracking/
    volumes:
      - tracking-uploads:/app/uploads/tracking
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started
      zipkin:
        condition: service_started

  admin-service:
    build: ./admin-service
    container_name: smartcourier-admin-service
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: Shanib@123
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started
      zipkin:
        condition: service_started

  api-gateway:
    build: ./api-gateway
    container_name: smartcourier-api-gateway
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      AUTH_SERVICE_URL: http://auth-service:8081
      DELIVERY_SERVICE_URL: http://delivery-service:8082
      TRACKING_SERVICE_URL: http://tracking-service:8083
      ADMIN_SERVICE_URL: http://admin-service:8084
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_started
      delivery-service:
        condition: service_started
      tracking-service:
        condition: service_started
      admin-service:
        condition: service_started
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
      zipkin:
        condition: service_started

volumes:
  mysql-data:
  tracking-uploads:
