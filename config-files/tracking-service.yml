server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tracking_db?createDatabaseIfNotExist=true
    username: root
    password: Shanib@123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

file:
  upload-dir: uploads/tracking/

smartcourier:
  rabbitmq:
    exchange: delivery.exchange
    queue: delivery.notifications
    routing-key: delivery.status.update

springdoc:
  swagger-ui:
    enabled: false
