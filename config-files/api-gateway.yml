server:
  port: 8080

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

smartcourier:
  routing:
    auth-base-url: http://localhost:8081
    delivery-base-url: http://localhost:8082
    tracking-base-url: http://localhost:8083
    admin-base-url: http://localhost:8084

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

jwt:
  secret: dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yc21hcnRjb3VyaWVy

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    path: /swagger-ui/index.html
    config-url: /v3/api-docs/swagger-config
    persistAuthorization: true
    disable-swagger-default-url: true
